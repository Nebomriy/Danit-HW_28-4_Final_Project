apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hw28-backend
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Nebomriy/Danit-HW_28-4_Final_Project.git
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: hw28

  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
